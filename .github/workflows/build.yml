name: CI and ArgoCD Manifest Update

on:
  push:
    branches:
      - develop
      - main

jobs:
  code-quality:
    name: Code Quality & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Snyk Vulnerability Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects
        continue-on-error: true

  build-scan-push:
    name: Build, Scan, and Push
    needs: code-quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: 
          - { name: 'auth-service', path: './services/auth-service' }
          - { name: 'chatbot-service', path: './services/chatbot-service' }
          - { name: 'diet-service', path: './services/diet-service' }
          - { name: 'progress-service', path: './services/progress-service' }
          - { name: 'user-service', path: './services/user-service' }
          - { name: 'workout-service', path: './services/workout-service' }
          - { name: 'yolo-exercise-service', path: './services/yolo-exercise-service' }
          - { name: 'frontend', path: './frontend' }
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Determine Image Tag
        id: image_tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "TAG=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Export image to local Docker
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.component.path }}
          load: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/fitbuddy-${{ matrix.component.name }}:${{ env.TAG }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/fitbuddy-${{ matrix.component.name }}:${{ env.TAG }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fitbuddy-${{ matrix.component.name }}:${{ env.TAG }}

  update-manifests:
    name: Update ArgoCD Manifests
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ArgoCD GitOps Repository
        uses: actions/checkout@v3
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: argocd-repo

      - name: Determine Environment and Tag
        id: env_config
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "NAMESPACE=dev" >> $GITHUB_ENV
            echo "TAG=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "NAMESPACE=production" >> $GITHUB_ENV
            echo "TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Update Kubernetes Manifests for ArgoCD
        working-directory: ./argocd-repo
        run: |
          find ./k8s -name "*.yaml" -type f -exec sed -i "s|${{ secrets.ACR_LOGIN_SERVER }}/fitbuddy-\(.*\):[a-zA-Z0-9.-]*|${{ secrets.ACR_LOGIN_SERVER }}/fitbuddy-\1:${{ env.TAG }}|g" {} +

      - name: Commit and Push Changes
        working-directory: ./argocd-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "chore: update image tags to ${{ env.TAG }} for ArgoCD" || echo "No changes to commit"
          git push origin main

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "GitHub Actions: CI & GitOps Update ${{ job.status }} for FitBuddy"
          body: "The CI Pipeline built the images and updated the ArgoCD manifests for the ${{ env.NAMESPACE }} environment. Status: ${{ job.status }}."
          to: ${{ secrets.TEAM_EMAIL_RECIPIENT || secrets.SMTP_USERNAME }}
          from: "GitHub Actions CI Bot"
