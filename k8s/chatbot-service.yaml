apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: default
  labels:
    app: chatbot-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
      - name: chatbot-service
        image: aravindacr.azurecr.io/fitbuddy-chatbot-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5005
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: bodygpt-config
              key: CHATBOT_SERVICE_PORT
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: MONGO_URI
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: JWT_ACCESS_SECRET
        - name: AZURE_AI_FOUNDRY_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_AI_FOUNDRY_ENDPOINT
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_OPENAI_API_KEY
        - name: AZURE_AI_SEARCH_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_AI_SEARCH_ENDPOINT
        - name: AZURE_AI_SEARCH_KEY
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_AI_SEARCH_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 5005
    targetPort: 5005
    protocol: TCP
  selector:
    app: chatbot-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
