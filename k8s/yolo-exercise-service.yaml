apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-exercise-service
  namespace: default
  labels:
    app: yolo-exercise-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yolo-exercise-service
  template:
    metadata:
      labels:
        app: yolo-exercise-service
    spec:
      containers:
      - name: yolo-exercise-service
        image: aravindacr.azurecr.io/fitbuddy-yolo-exercise-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 20
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: bodygpt-config
              key: YOLO_EXERCISE_PORT
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: MONGO_URI
        - name: AZURE_SERVICEBUS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_SERVICEBUS_CONNECTION_STRING
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: bodygpt-secrets
              key: AZURE_STORAGE_CONNECTION_STRING
---
apiVersion: v1
kind: Service
metadata:
  name: yolo-exercise-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  selector:
    app: yolo-exercise-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yolo-exercise-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yolo-exercise-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
