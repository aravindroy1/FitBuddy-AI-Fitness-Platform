server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Microservices
    location /api/auth/ {
        proxy_pass http://auth-service:5001/;
    }
    location = /api/auth {
        return 307 /api/auth/;
    }

    location /api/user/ {
        proxy_pass http://user-service:5002/;
    }
    location = /api/user {
        return 307 /api/user/;
    }

    location /api/diet/ {
        proxy_pass http://diet-service:5003/;
    }
    location = /api/diet {
        return 307 /api/diet/;
    }

    location /api/workout/ {
        proxy_pass http://workout-service:5004/;
    }
    location = /api/workout {
        return 307 /api/workout/;
    }

    location /api/chat/ {
        proxy_pass http://chatbot-service:5005/;
    }
    location = /api/chat {
        return 307 /api/chat/;
    }

    location /api/progress/ {
        proxy_pass http://progress-service:5006/;
    }
    location = /api/progress {
        return 307 /api/progress/;
    }

    location /api/exercise/ {
        proxy_pass http://yolo-exercise-service:8001/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location = /api/exercise {
        return 307 /api/exercise/;
    }

    location /api/food/ {
        proxy_pass http://food-recognition-service:8002/;
    }
    location = /api/food {
        return 307 /api/food/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
